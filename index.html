<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Научные кружки</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .title { font-size: 18px; font-weight: bold; }
        .type { background: #40a7e3; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; display: inline-block; margin-right: 8px; }
        .direction { background: #e0e0e0; padding: 4px 8px; border-radius: 6px; font-size: 12px; display: inline-block; }
    </style>
    <!-- НЕТ ПОДКЛЮЧЕНИЯ ВНЕШНИХ СКРИПТОВ -->
</head>
<body>
    <h1>🔬 Научные объединения</h1>
    <div id="container"></div>

    <script>
        // Данные прямо в коде
        const unions = [
            {
                name: "СНК Программирование Python",
                type: "СНК",
                direction: "IT",
                description: "Изучаем Python, создаём проекты, участвуем в хакатонах",
                contacts: "@python_professor"
            },
            {
                name: "СНО Молекулярная биология",
                type: "СНО",
                direction: "Биология",
                description: "Исследования в области биологии, работа в лабораториях",
                contacts: "@bio_researcher"
            },
            {
                name: "СНК Квантовая физика",
                type: "СНК",
                direction: "Физика",
                description: "Изучение квантовых явлений, эксперименты",
                contacts: "@quantum_physics"
            }
        ];

        const container = document.getElementById('container');
        container.innerHTML = '';

        unions.forEach(u => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="title">${u.name}</div>
                <span class="type">${u.type}</span>
                <span class="direction">${u.direction}</span>
                <p>${u.description}</p>
                <p>👤 ${u.contacts}</p>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
