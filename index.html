<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Научные кружки</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .title { font-size: 18px; font-weight: bold; }
        .type { background: #40a7e3; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; display: inline-block; margin-right: 8px; }
        .direction { background: #e0e0e0; padding: 4px 8px; border-radius: 6px; font-size: 12px; display: inline-block; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>🔬 Научные объединения</h1>
    <div id="container"></div>
    <script>
        const tg = Telegram.WebApp;
        tg.expand();
        const data = [{"name": "СНК \"Программирование Python\"", "type": "СНК", "direction": "Программирование", "description": "Изучаем Python, создаём проекты, участвуем в хакатонах", "contacts": "@python_professor"}, {"name": "СНО \"Молекулярная биология\"", "type": "СНО", "direction": "Биология", "description": "Исследования в области биологии, работа в лабораториях", "contacts": "@bio_researcher"}, {"name": "СНК \"Квантовая физика\"", "type": "СНК", "direction": "Физика", "description": "Изучение квантовых явлений, эксперименты", "contacts": "@quantum_physics"}, {"name": "СНК \"Квантовая физика\"", "type": "СНК", "direction": "Физика", "description": "Изучаем квантовые явления и проводим эксперименты", "contacts": "@quantum_physics"}, {"name": "СНО \"Робототехника\"", "type": "СНО", "direction": "IT, Инженерия", "description": "Собираем роботов, участвуем в соревнованиях", "contacts": "@robotics_team"}, {"name": "СНК \"Биохимия\"", "type": "СНК", "direction": "Биология, Химия", "description": "Исследования на стыке биологии и химии", "contacts": "@biochemistry_lab"}];
        const container = document.getElementById('container');
        data.forEach(u => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="title">${u.name}</div>
                <span class="type">${u.type}</span>
                <span class="direction">${u.direction}</span>
                <p>${u.description}</p>
                <p>👤 ${u.contacts}</p>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
