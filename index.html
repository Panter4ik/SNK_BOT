<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Научные кружки</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .title { font-size: 18px; font-weight: bold; }
        .type { background: #40a7e3; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; display: inline-block; margin-right: 8px; }
        .direction { background: #e0e0e0; padding: 4px 8px; border-radius: 6px; font-size: 12px; display: inline-block; }
        #error { color: red; font-weight: bold; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>🔬 Научные объединения</h1>
    <div id="container">Загрузка...</div>
    <div id="error"></div>

    <script>
        // Ловим все непойманные ошибки промисов
        window.addEventListener('unhandledrejection', function(event) {
            document.getElementById('error').innerHTML = 'Ошибка: ' + (event.reason?.message || JSON.stringify(event.reason));
            console.error('Unhandled rejection:', event.reason);
        });

        // Ловим обычные ошибки
        window.onerror = function(msg, url, line) {
            document.getElementById('error').innerHTML = 'Ошибка: ' + msg + ' на строке ' + line;
            return true;
        };

        const tg = Telegram.WebApp;
        tg.expand();

        // Используем полный URL для надёжности
        fetch('https://panter4ik.github.io/SNK_BOT/data.json')
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ошибка ${r.status}`);
                return r.json();
            })
            .then(data => {
                const container = document.getElementById('container');
                container.innerHTML = '';
                if (data.length === 0) {
                    container.innerHTML = 'Пока нет кружков 😢';
                    return;
                }
                data.forEach(u => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="title">${u.name}</div>
                        <span class="type">${u.type}</span>
                        <span class="direction">${u.direction}</span>
                        <p>${u.description}</p>
                        <p>👤 ${u.contacts}</p>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('container').innerHTML = '';
                document.getElementById('error').innerHTML = 'Ошибка загрузки данных: ' + err.message;
            });
    </script>
</body>
</html>
